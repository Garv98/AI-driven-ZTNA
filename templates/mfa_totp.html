<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify TOTP</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-xl p-8 rounded-xl w-full max-w-sm">
    <h2 class="text-2xl font-semibold text-center mb-4">Authenticator Verification</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-2 text-{{ 'green' if category == 'success' else 'red' }}-600">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <label class="block mb-2 font-medium">Authenticator Code:</label>
      <input name="otp" type="text" class="w-full p-2 border rounded mb-4" required>
      <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Verify</button>
    </form>
  </div>
</body>
</html>
