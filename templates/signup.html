<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container col-xl-10 col-xxl-8 px-4 py-5">
    <div class="row align-items-center g-lg-5 py-5">
        <div class="col-lg-7 text-center text-lg-start">
            <h1 class="display-4 fw-bold lh-1 mb-3">ZTNA Signup</h1>
            <p class="col-lg-10 fs-4">Create your account to securely access the system.</p>
        </div>
        <div class="col-md-10 mx-auto col-lg-5">
            <form method="POST" action="/signup" class="p-4 p-md-5 border rounded-3 bg-light">
                <div class="form-floating mb-3">
                    <input type="text" name="username" class="form-control" id="floatingEmail" placeholder="name" required>
                    <label for="floatingEmail">User Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                    <label for="floatingPassword">Password</label>
                </div>
                <button class="w-100 btn btn-lg btn-primary" type="submit">Sign Up</button>
                <hr class="my-4">
                <div class="text-center">
                    <small class="text-muted">Already have an account? <a href="{{ url_for('login') }}">Login</a></small>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
